apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudgamepaymentapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudgamepaymentapi
  template:
    metadata:
      labels:
        app: cloudgamepaymentapi
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done']
        - name: wait-for-sqlserver
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z sqlserver 1433; do echo waiting for sqlserver; sleep 2; done']
      containers:
        - name: cloudgamepaymentapi
          image: dpsnbsb79/payment-api:latest
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: payment-api-config
            - secretRef:
                name: payment-api-secret